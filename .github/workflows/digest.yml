name: School Email Digest

on:
  schedule:
    # Daily digest: ~6 PM EST Mon-Fri (23:00 UTC; ~7 PM during EDT)
    - cron: '0 23 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no email sent)'
        type: boolean
        default: false

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          CHILDREN: ${{ secrets.CHILDREN }}
          SCHOOL_DOMAINS: ${{ secrets.SCHOOL_DOMAINS }}
        run: |
          FLAGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python3 digest.py $FLAGS
